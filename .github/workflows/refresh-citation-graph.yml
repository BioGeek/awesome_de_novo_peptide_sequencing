name: Refresh citation graph

on:
  schedule:
    # Monthly on the 1st at 07:00 UTC, 30 minutes after the weekly window
    # closes (when the 1st falls on a Sunday) and a full hour after the daily
    # repo-metrics workflow, so the three never race on the main branch.
    # Crossref + Semantic Scholar back-fill their reference indexes over
    # weeks/months as new bibliographies are ingested, so an existing
    # publication's resolvable edges can grow even without us adding new
    # papers. Monthly catches that drift without burning rate budget on a
    # ~30-minute full sweep too often.
    - cron: '0 7 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions:  write   # trigger publish.yml after a successful commit

jobs:
  refresh:
    runs-on: ubuntu-latest
    # The Crossref + Semantic Scholar walk takes ~30 minutes for a full catalog
    # pass; give the job 60 minutes to absorb transient rate-limit retries.
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync Python environment
        run: uv sync --frozen

      - name: Rebuild citation graph
        # Run the full sweep (not --skip-processed): the script uses
        # INSERT OR IGNORE so existing edges aren't re-touched, but Crossref
        # / Semantic Scholar may have surfaced newly-indexed references for
        # pubs we previously processed.
        run: |
          uv run python build_citations.py
          sqlite3 denovo.db .dump > denovo.sql

      - name: Commit if edges changed
        id: commit
        run: |
          if [[ -z "$(git status --porcelain denovo.db denovo.sql)" ]]; then
            echo "No new citation edges resolved this month, nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add denovo.db denovo.sql
          # citation_audit.csv is gitignored; intentional.
          git commit -m "Monthly refresh of intra-catalog citation graph

          Built by .github/workflows/refresh-citation-graph.yml"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site rebuild
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml --ref main
