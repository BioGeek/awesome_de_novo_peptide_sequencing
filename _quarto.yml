project:
  type: website
  output-dir: _site
  render:
    - index.qmd

website:
  title: "Awesome *De Novo* Peptide Sequencing"
  description: "A comprehensive, interactive map of the *de novo* peptide sequencing field — algorithms, post-processors, downstream applications, and adjacent tools, deep-learning and classical alike."
  site-url: https://jeroen.vangoey.be/awesome_de_novo_peptide_sequencing/
  repo-url: https://github.com/BioGeek/awesome_de_novo_peptide_sequencing
  repo-actions: [edit, issue]
  page-navigation: false
  back-to-top-navigation: true

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    toc-title: "On this page"
    code-tools: false
    fig-responsive: true
    grid:
      body-width: 1100px
    include-in-header:
      - text: |
          <meta name="description" content="A comprehensive, interactive map of the de novo peptide sequencing field — algorithms, post-processors, downstream applications, and adjacent tools, deep-learning and classical alike.">
          <meta property="og:title" content="Awesome De Novo Peptide Sequencing">
          <meta property="og:description" content="Comprehensive interactive map of the de novo peptide sequencing field — algorithms, post-processors, downstream applications, and adjacent tools (DL and classical).">
